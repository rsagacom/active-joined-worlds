name: lobster-chat-ci

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**"
      - "crates/**"
      - "scripts/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**"
      - "crates/**"
      - "scripts/**"
      - "README.md"
  workflow_dispatch:

jobs:
  rust-smoke:
    runs-on: ubuntu-latest
    env:
      TERM: xterm-256color
      LOBSTER_CHAT_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify portable smoke helpers
        run: python3 scripts/test_start_terminal_unit.py

      - name: Verify release gate helper syntax
        run: |
          bash -n scripts/smoke-release-gate.sh
          bash -n scripts/smoke-public-ingress.sh

      - name: Cargo check
        run: cargo check --workspace --quiet

      - name: Workspace tests
        run: cargo test --workspace --quiet

      - name: CLI smoke
        run: scripts/smoke-cli-channel.sh

      - name: Auth smoke
        run: scripts/smoke-auth-registration.sh

      - name: Resident mainline smoke
        run: scripts/smoke-resident-mainline.sh

      - name: Install layout smoke
        run: scripts/smoke-install-layout.sh

      - name: Provider federation smoke
        run: scripts/smoke-provider-federation.sh

      - name: Web shell smoke
        run: scripts/smoke-web-shell.sh

      - name: Terminal smoke
        run: python3 scripts/test_start_terminal.py
